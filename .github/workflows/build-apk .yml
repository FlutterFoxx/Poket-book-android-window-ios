#  poketbook — Mobile App CI/CD
#  Builds: Android AAB (Play Store) + APK (direct install)
##############################################################

name: Build & Release poketbook Apps

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options: [ 'android', 'ios', 'both' ]
      version_override:
        description: 'Version name override (e.g. 1.2.0) — leave blank to auto-compute'
        required: false
        default: ''

env:
  REACT_APP_BACKEND_URL: https://party-tally-1.preview.emergentagent.com
  NODE_VERSION: '22'
  JAVA_VERSION: '17'
  BUNDLE_ID: 'in.poketbook.app'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

#################################################################
#  JOB 1 — Compute Version Numbers
#################################################################
jobs:
  version:
    name: Compute Version Numbers
    runs-on: ubuntu-latest
    outputs:
      version_code: ${{ steps.version.outputs.version_code }}
      version_name: ${{ steps.version.outputs.version_name }}
      release_tag:  ${{ steps.version.outputs.release_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          VERSION_CODE="${{ github.run_number }}"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION_NAME="${{ github.ref_name }}"
            VERSION_NAME="${VERSION_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version_override }}" ]]; then
            VERSION_NAME="${{ github.event.inputs.version_override }}"
          else
            VERSION_NAME="1.0.${VERSION_CODE}"
          fi

          RELEASE_TAG="v${VERSION_NAME}"

          echo "version_code=${VERSION_CODE}"  >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}"  >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}"    >> "$GITHUB_OUTPUT"

          echo "### Version Info" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |"          >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|"          >> "$GITHUB_STEP_SUMMARY"
          echo "| Version Name | \`${VERSION_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version Code | \`${VERSION_CODE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release Tag  | \`${RELEASE_TAG}\`  |" >> "$GITHUB_STEP_SUMMARY"

#################################################################
#  JOB 2 — Build React Web App
#################################################################
  build-web:
    name: Build React Web App
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Build React app
        working-directory: ./frontend
        env:
          CI: false
          DISABLE_ESLINT_PLUGIN: true
          SKIP_PREFLIGHT_CHECK: true
          GENERATE_SOURCEMAP: false
          REACT_APP_BACKEND_URL: ${{ env.REACT_APP_BACKEND_URL }}
          REACT_APP_VERSION: ${{ needs.version.outputs.version_name }}
        run: npm run build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ needs.version.outputs.version_code }}
          path: frontend/build/
          retention-days: 7

#################################################################
#  JOB 3 — Build Android Signed AAB + APK
#################################################################
  build-android:
    name: Build Android AAB + APK
    runs-on: ubuntu-latest
    needs: [ version, build-web ]
    if: ${{ github.event.inputs.platform != 'ios' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build-${{ needs.version.outputs.version_code }}
          path: frontend/build/

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Install Capacitor CLI
        working-directory: ./frontend
        run: npm install -g @capacitor/cli@6.2.0

      - name: Sync Capacitor to Android
        working-directory: ./frontend
        run: npx cap sync android

      - name: Restore build.gradle after cap sync
        run: git checkout frontend/android/app/build.gradle

      - name: Make Gradle wrapper executable
        working-directory: ./frontend/android
        run: chmod +x gradlew

      - name: Build signed Release AAB + APK
        working-directory: ./frontend/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease assembleRelease

      - name: Rename artifacts
        run: |
          V="${{ needs.version.outputs.version_name }}"
          C="${{ needs.version.outputs.version_code }}"
          cp "frontend/android/app/build/outputs/bundle/release/app-release.aab" \
             "poketbook-v${V}-${C}.aab" 2>/dev/null || true
          APK=$(find frontend/android/app/build/outputs/apk/release/ -name "*.apk" | head -1)
          [ -n "$APK" ] && cp "$APK" "poketbook-v${V}-${C}.apk" || true

      - name: Upload AAB for Play Store
        uses: actions/upload-artifact@v4
        with:
          name: poketbook-android-aab-v${{ needs.version.outputs.version_name }}
          path: poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}.aab
          retention-days: 90

      - name: Upload APK for direct install
        uses: actions/upload-artifact@v4
        with:
          name: poketbook-android-apk-v${{ needs.version.outputs.version_name }}
          path: poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}.apk
          retention-days: 90

      - name: Android build summary
        run: |
          echo "### Android Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact | Purpose |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}.aab | Upload to Google Play Store |" >> "$GITHUB_STEP_SUMMARY"
          echo "| poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}.apk | Direct install on phone |" >> "$GITHUB_STEP_SUMMARY"
