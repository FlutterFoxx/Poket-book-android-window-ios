##############################################################
#  poketbook — Mobile App CI/CD
#  Builds: Android AAB (Play Store) + iOS IPA (App Store / AltStore)
#
#  SECURITY: All keys, passwords, and certificates are stored
#  ONLY in GitHub Secrets vault. Zero secrets in this file.
##############################################################

name: Build & Release poketbook Apps

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # Trigger on version tags: v1.0.0, v1.2.3
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'both'
        type: choice
        options: [ 'android', 'ios', 'both' ]
      version_override:
        description: 'Version name override (e.g. 1.2.0) — leave blank to auto-compute'
        required: false
        default: ''

env:
  # ── Backend URL (not a secret — this is the public API endpoint) ──────────
  REACT_APP_BACKEND_URL: https://party-tally-1.preview.emergentagent.com
  NODE_VERSION: '18'
  JAVA_VERSION: '17'
  BUNDLE_ID: 'in.poketbook.app'

#################################################################
#  JOB 1 — Compute Version Numbers (shared by all jobs)
#################################################################
jobs:
  version:
    name: Compute Version Numbers
    runs-on: ubuntu-latest
    outputs:
      version_code: ${{ steps.version.outputs.version_code }}
      version_name: ${{ steps.version.outputs.version_name }}
      release_tag:  ${{ steps.version.outputs.release_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for commit count

      - name: Compute version
        id: version
        run: |
          # VERSION_CODE = GitHub run number (always incrementing, required by stores)
          VERSION_CODE="${{ github.run_number }}"

          # VERSION_NAME: from tag → v1.2.3 → 1.2.3
          #               from manual input override
          #               fallback: 1.0.<run_number>
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION_NAME="${{ github.ref_name }}"
            VERSION_NAME="${VERSION_NAME#v}"   # strip leading 'v'
          elif [[ -n "${{ github.event.inputs.version_override }}" ]]; then
            VERSION_NAME="${{ github.event.inputs.version_override }}"
          else
            VERSION_NAME="1.0.${VERSION_CODE}"
          fi

          RELEASE_TAG="v${VERSION_NAME}"

          echo "version_code=${VERSION_CODE}"  >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}"  >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}"    >> "$GITHUB_OUTPUT"

          echo "### Version Info" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version Name | \`${VERSION_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version Code | \`${VERSION_CODE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release Tag  | \`${RELEASE_TAG}\`  |" >> "$GITHUB_STEP_SUMMARY"

#################################################################
#  JOB 2 — Build React Web App (shared asset)
#################################################################
  build-web:
    name: Build React Web App
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile

      - name: Build React app
        working-directory: ./frontend
        env:
          CI: false
          DISABLE_ESLINT_PLUGIN: true
          # Public API URL — not a secret
          REACT_APP_BACKEND_URL: ${{ env.REACT_APP_BACKEND_URL }}
          REACT_APP_VERSION: ${{ needs.version.outputs.version_name }}
        run: yarn build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ needs.version.outputs.version_code }}
          path: frontend/build/
          retention-days: 1   # only needed during pipeline

#################################################################
#  JOB 3 — Build Android AAB (Play Store) + APK (direct install)
#################################################################
  build-android:
    name: Build Android AAB + APK
    runs-on: ubuntu-latest
    needs: [ version, build-web ]
    if: github.event.inputs.platform != 'ios'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build-${{ needs.version.outputs.version_code }}
          path: frontend/build/

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile

      - name: Sync Capacitor → Android
        working-directory: ./frontend
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        working-directory: ./frontend/android
        run: chmod +x gradlew

      # ── Decode keystore from Secret vault ──────────────────────────────────
      # SECURITY: The keystore is stored base64-encoded in GitHub Secrets.
      # It is decoded to a temp file at build time and never committed to code.
      - name: Decode Android keystore from Secrets
        run: |
          echo "${{ secrets.ANDROID_SIGNING_KEY }}" | base64 --decode > \
            ${{ github.workspace }}/frontend/android/app/poketbook-release.keystore

      # ── Build signed Release AAB (required for Google Play Store) ──────────
      - name: Build signed Release AAB
        working-directory: ./frontend/android
        env:
          # SECURITY: All credentials come ONLY from GitHub Secrets — never hardcoded
          VERSION_CODE:        ${{ needs.version.outputs.version_code }}
          VERSION_NAME:        ${{ needs.version.outputs.version_name }}
          KEYSTORE_PATH:       app/poketbook-release.keystore
          KEYSTORE_PASSWORD:   ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS:           ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:        ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease
          echo "✅ AAB built: app/build/outputs/bundle/release/app-release.aab"

      # ── Also build a signed APK for direct installation (sideloading) ──────
      - name: Build signed Release APK (direct install)
        working-directory: ./frontend/android
        env:
          VERSION_CODE:        ${{ needs.version.outputs.version_code }}
          VERSION_NAME:        ${{ needs.version.outputs.version_name }}
          KEYSTORE_PATH:       app/poketbook-release.keystore
          KEYSTORE_PASSWORD:   ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS:           ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:        ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      # ── Rename artifacts with version ──────────────────────────────────────
      - name: Rename artifacts
        run: |
          V="${{ needs.version.outputs.version_name }}"
          C="${{ needs.version.outputs.version_code }}"
          cp "frontend/android/app/build/outputs/bundle/release/app-release.aab" \
             "poketbook-v${V}-${C}.aab"
          cp "frontend/android/app/build/outputs/apk/release/app-release.apk" \
             "poketbook-v${V}-${C}.apk" 2>/dev/null || \
          cp "frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk" \
             "poketbook-v${V}-${C}.apk"

      # ── Wipe the decoded keystore file ─────────────────────────────────────
      # SECURITY: Remove decoded keystore immediately after build
      - name: Wipe keystore file
        if: always()
        run: |
          rm -f ${{ github.workspace }}/frontend/android/app/poketbook-release.keystore
          echo "Keystore wiped from runner."

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: poketbook-android-aab-v${{ needs.version.outputs.version_name }}
          path: poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}.aab
          retention-days: 90

      - name: Upload APK (direct install)
        uses: actions/upload-artifact@v4
        with:
          name: poketbook-android-apk-v${{ needs.version.outputs.version_name }}
          path: poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}.apk
          retention-days: 90

      - name: Android build summary
        run: |
          echo "### ✅ Android Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact | Purpose |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}.aab\` | Upload to **Google Play Store** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}.apk\` | **Direct install** (sideloading) |" >> "$GITHUB_STEP_SUMMARY"

#################################################################
#  JOB 4 — Build iOS IPA (macOS runner required)
#################################################################
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: [ version, build-web ]
    if: github.event.inputs.platform != 'android'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build-${{ needs.version.outputs.version_code }}
          path: frontend/build/

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile

      - name: Install CocoaPods
        run: sudo gem install cocoapods --no-document

      - name: Sync Capacitor → iOS
        working-directory: ./frontend
        run: npx cap sync ios

      - name: Install iOS Pods
        working-directory: ./frontend/ios/App
        run: pod install

      # ── Decode Apple signing cert from Secret vault ─────────────────────────
      # SECURITY: P12 certificate stored base64-encoded in GitHub Secrets
      - name: Import Apple distribution certificate
        uses: apple-actions/import-codesign-certs@v2
        with:
          # SECURITY: Referenced from Secrets vault only
          p12-file-base64: ${{ secrets.IOS_P12_BASE64 }}
          p12-password:    ${{ secrets.IOS_P12_PASSWORD }}

      # ── Download provisioning profile via App Store Connect API ────────────
      # SECURITY: All Apple API credentials from Secrets vault
      - name: Download provisioning profile
        uses: apple-actions/download-provisioning-profiles@v1
        with:
          bundle-id:       ${{ env.BUNDLE_ID }}
          issuer-id:       ${{ secrets.APPLE_ISSUER_ID }}
          api-key-id:      ${{ secrets.APPLE_KEY_ID }}
          api-private-key: ${{ secrets.APPLE_PRIVATE_KEY }}

      # ── Build and archive ──────────────────────────────────────────────────
      - name: Build iOS Archive (.xcarchive)
        working-directory: ./frontend/ios
        run: |
          xcodebuild archive \
            -workspace App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ../poketbook-${{ needs.version.outputs.version_name }}.xcarchive \
            PRODUCT_BUNDLE_IDENTIFIER=${{ env.BUNDLE_ID }} \
            MARKETING_VERSION=${{ needs.version.outputs.version_name }} \
            CURRENT_PROJECT_VERSION=${{ needs.version.outputs.version_code }} \
            | xcbeautify || true

      # ── Export IPA ─────────────────────────────────────────────────────────
      - name: Export IPA
        working-directory: ./frontend
        run: |
          xcodebuild -exportArchive \
            -archivePath "poketbook-${{ needs.version.outputs.version_name }}.xcarchive" \
            -exportPath "poketbook-ipa" \
            -exportOptionsPlist "ios/App/ExportOptions.plist" \
            | xcbeautify || true
          mv "poketbook-ipa/App.ipa" \
             "poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}.ipa" \
             2>/dev/null || \
          mv "poketbook-ipa/poketbook.ipa" \
             "poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: poketbook-ios-ipa-v${{ needs.version.outputs.version_name }}
          path: frontend/poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}.ipa
          retention-days: 90

      - name: iOS build summary
        run: |
          echo "### ✅ iOS Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact | Purpose |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}.ipa\` | **TestFlight / App Store / AltStore** |" >> "$GITHUB_STEP_SUMMARY"

#################################################################
#  JOB 5 — Update AltStore Source JSON + Create GitHub Release
#################################################################
  publish:
    name: Update AltStore Source + Create Release
    runs-on: ubuntu-latest
    needs: [ version, build-android, build-ios ]
    if: always() && (needs.build-android.result == 'success' || needs.build-ios.result == 'success')
    permissions:
      contents: write   # needed to push altstore-source.json and create releases

    steps:
      - uses: actions/checkout@v4
        with:
          # SECURITY: Use GITHUB_TOKEN (auto-provided, never hardcoded)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: poketbook-android-aab-v${{ needs.version.outputs.version_name }}
          path: dist/
        continue-on-error: true

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: poketbook-android-apk-v${{ needs.version.outputs.version_name }}
          path: dist/
        continue-on-error: true

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: poketbook-ios-ipa-v${{ needs.version.outputs.version_name }}
          path: dist/
        continue-on-error: true

      # ── Update AltStore source JSON ─────────────────────────────────────────
      - name: Update AltStore source JSON
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ needs.version.outputs.release_tag }}"
          VER="${{ needs.version.outputs.version_name }}"
          CODE="${{ needs.version.outputs.version_code }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          IPA_URL="https://github.com/${REPO}/releases/download/${TAG}/poketbook-v${VER}-${CODE}.ipa"

          # Calculate IPA size (if file exists)
          IPA_FILE="dist/poketbook-v${VER}-${CODE}.ipa"
          if [ -f "$IPA_FILE" ]; then
            IPA_SIZE=$(stat -c%s "$IPA_FILE" 2>/dev/null || stat -f%z "$IPA_FILE" 2>/dev/null || echo "0")
            SHA256=$(sha256sum "$IPA_FILE" | cut -d' ' -f1)
          else
            IPA_SIZE="15728640"
            SHA256=""
          fi

          python3 - <<PYEOF
          import json, sys

          with open('altstore-source.json', 'r') as f:
              src = json.load(f)

          # Update sourceURL and iconURL with real repo
          repo = "${REPO}"
          src['sourceURL'] = f"https://raw.githubusercontent.com/{repo}/main/altstore-source.json"
          src['apps'][0]['iconURL'] = f"https://raw.githubusercontent.com/{repo}/main/frontend/public/logo512.png"

          new_version = {
              "version": "${VER}",
              "buildVersion": "${CODE}",
              "date": "${DATE}",
              "localizedDescription": "poketbook v${VER}\n\n• 7-day FREE trial\n• Double-entry ledger\n• Google Sheets backup\n• Email auto-backup\n• Phone OTP login\n• Shared database with web app",
              "downloadURL": "${IPA_URL}",
              "minOSVersion": "13.0",
              "size": int("${IPA_SIZE}")
          }

          # Prepend new version (most recent first)
          versions = src['apps'][0].get('versions', [])
          # Remove duplicate if same version exists
          versions = [v for v in versions if v.get('version') != '${VER}']
          versions.insert(0, new_version)
          src['apps'][0]['versions'] = versions

          # Update source-level download URL
          src['apps'][0]['downloadURL'] = "${IPA_URL}"

          # Update news
          src['news'] = [{
              "title": "poketbook v${VER} Released!",
              "identifier": "poketbook-v${VER//./-}",
              "caption": "New version with latest features. Download now!",
              "date": "${DATE[:10]}",
              "tintColor": "22C55E",
              "imageURL": f"https://raw.githubusercontent.com/{repo}/main/frontend/public/logo512.png",
              "url": "https://poketbook.in",
              "notify": True
          }]

          with open('altstore-source.json', 'w') as f:
              json.dump(src, f, indent=2)

          print(f"✅ AltStore source updated: v${VER} (code ${CODE})")
          print(f"   IPA URL: ${IPA_URL}")
          PYEOF

      # ── Commit updated AltStore JSON ────────────────────────────────────────
      - name: Commit AltStore source update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add altstore-source.json
          if git diff --cached --quiet; then
            echo "No changes to altstore-source.json"
          else
            git commit -m "chore: update AltStore source for v${{ needs.version.outputs.version_name }} [skip ci]"
            git push origin HEAD:main
            echo "✅ AltStore source committed"
          fi

      # ── Create GitHub Release ───────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version.outputs.release_tag }}
          name: "poketbook ${{ needs.version.outputs.release_tag }}"
          # SECURITY: token is auto-provided — never hardcode PAT here
          token: ${{ secrets.GITHUB_TOKEN }}
          files: dist/*
          body: |
            ## 🚀 poketbook ${{ needs.version.outputs.release_tag }}

            **Version Code:** `${{ needs.version.outputs.version_code }}`
            **Backend:** `https://party-tally-1.preview.emergentagent.com` (shared database)

            ---

            ### 📥 Downloads

            | Platform | File | Use For |
            |----------|------|---------|
            | 🤖 Android | `*.aab` | Google Play Store upload |
            | 🤖 Android | `*.apk` | Direct sideload install |
            | 🍎 iOS | `*.ipa` | TestFlight / App Store / AltStore |

            ---

            ### 🤖 Install Android APK (Direct)
            1. Download `poketbook-v${{ needs.version.outputs.version_name }}-*.apk`
            2. Settings → Security → **Enable Unknown Sources**
            3. Open APK → Install

            ### 🍎 Install iOS via AltStore (FREE — no Apple account needed)
            1. Install **AltStore** from https://altstore.io
            2. Add this source URL in AltStore:
               ```
               https://raw.githubusercontent.com/${{ github.repository }}/main/altstore-source.json
               ```
            3. Browse → poketbook → Install
            4. Auto-updates when new versions are released!

            ### 🌐 Shared Database
            All three clients connect to the **same backend**:
            > Both web app and mobile app use the same MongoDB database.
            > Login once — data syncs across web, Android, and iOS.

            ---
