name: Build and Release PoketBook Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - both
      version_override:
        description: 'Version name (e.g. 1.2.0) — blank = auto'
        required: false
        default: ''

env:
  REACT_APP_BACKEND_URL: https://party-tally-1.preview.emergentagent.com
  NODE_VERSION: '22'
  JAVA_VERSION: '17'
  BUNDLE_ID: in.poketbook.app

jobs:
  version:
    name: Compute Version
    runs-on: ubuntu-latest
    outputs:
      version_code: ${{ steps.v.outputs.version_code }}
      version_name: ${{ steps.v.outputs.version_name }}
      release_tag: ${{ steps.v.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute version
        id: v
        run: |
          CODE="${{ github.run_number }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            NAME="${{ github.ref_name }}"
            NAME="${NAME#v}"
          elif [[ -n "${{ github.event.inputs.version_override }}" ]]; then
            NAME="${{ github.event.inputs.version_override }}"
          else
            NAME="1.0.${CODE}"
          fi
          echo "version_code=${CODE}" >> "$GITHUB_OUTPUT"
          echo "version_name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${NAME}" >> "$GITHUB_OUTPUT"
          echo "### Version: ${NAME} (code ${CODE})" >> "$GITHUB_STEP_SUMMARY"

  build-web:
    name: Build React App
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps
      - name: Build React app
        working-directory: ./frontend
        env:
          CI: false
          DISABLE_ESLINT_PLUGIN: true
          SKIP_PREFLIGHT_CHECK: true
          GENERATE_SOURCEMAP: false
          REACT_APP_BACKEND_URL: ${{ env.REACT_APP_BACKEND_URL }}
          REACT_APP_VERSION: ${{ needs.version.outputs.version_name }}
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ needs.version.outputs.version_code }}
          path: frontend/build/

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs:
      - version
      - build-web
    if: ${{ github.event.inputs.platform != 'ios' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - uses: android-actions/setup-android@v3
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build-${{ needs.version.outputs.version_code }}
          path: frontend/build/
      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@6.2.0
      - name: Sync Capacitor to Android
        working-directory: ./frontend
        run: npx cap sync android
      - name: Restore build.gradle after cap sync
        run: git checkout frontend/android/app/build.gradle && echo "build.gradle restored from git"
      - name: Make Gradle executable
        working-directory: ./frontend/android
        run: chmod +x gradlew
      - name: Decode keystore
        run: |
          if [ -n "$SIGNING_KEY" ]; then
            echo "$SIGNING_KEY" | base64 --decode > ${{ github.workspace }}/frontend/android/app/poketbook-release.keystore
            echo "Keystore decoded: $(stat -c%s ${{ github.workspace }}/frontend/android/app/poketbook-release.keystore) bytes"
          else
            echo "No ANDROID_SIGNING_KEY secret — will fall back to debug build"
          fi
        env:
          SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
      - name: Build Android artifacts
        working-directory: ./frontend/android
        env:
          VERSION_CODE: ${{ needs.version.outputs.version_code }}
          VERSION_NAME: ${{ needs.version.outputs.version_name }}
          KEYSTORE_PATH: ${{ github.workspace }}/frontend/android/app/poketbook-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_PASSWORD" ] && [ -f "$KEYSTORE_PATH" ]; then
            echo "Signing secrets present — building signed Release AAB and APK"
            ./gradlew bundleRelease --no-daemon
            ./gradlew assembleRelease --no-daemon
            echo "BUILD_TYPE=release" >> "$GITHUB_ENV"
          else
            echo "No signing secrets — building unsigned Debug APK"
            ./gradlew assembleDebug --no-daemon
            echo "BUILD_TYPE=debug" >> "$GITHUB_ENV"
          fi
      - name: Wipe keystore
        if: always()
        run: rm -f ${{ github.workspace }}/frontend/android/app/poketbook-release.keystore
      - name: Rename artifacts
        run: |
          V="${{ needs.version.outputs.version_name }}"
          C="${{ needs.version.outputs.version_code }}"
          if [ "$BUILD_TYPE" = "release" ]; then
            cp "frontend/android/app/build/outputs/bundle/release/app-release.aab" \
               "poketbook-v${V}-${C}.aab" 2>/dev/null || true
            APK=$(find frontend/android/app/build/outputs/apk/release/ -name "*.apk" | head -1)
            [ -n "$APK" ] && cp "$APK" "poketbook-v${V}-${C}-release.apk" || true
          else
            APK=$(find frontend/android/app/build/outputs/apk/debug/ -name "*.apk" | head -1)
            [ -n "$APK" ] && cp "$APK" "poketbook-v${V}-${C}-debug.apk" || true
          fi
      - name: Upload AAB for Play Store
        if: ${{ env.BUILD_TYPE == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: poketbook-android-aab-v${{ needs.version.outputs.version_name }}
          path: poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}.aab
          retention-days: 90
      - name: Upload Release APK
        if: ${{ env.BUILD_TYPE == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: poketbook-android-apk-release-v${{ needs.version.outputs.version_name }}
          path: poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}-release.apk
          retention-days: 90
      - name: Upload Debug APK
        if: ${{ env.BUILD_TYPE == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: poketbook-android-apk-debug-v${{ needs.version.outputs.version_name }}
          path: poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}-debug.apk
          retention-days: 30
      - name: Build summary
        run: |
          echo "### Android Build ($BUILD_TYPE)" >> "$GITHUB_STEP_SUMMARY"
          if [ "$BUILD_TYPE" = "release" ]; then
            echo "- AAB (Play Store): poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}.aab" >> "$GITHUB_STEP_SUMMARY"
            echo "- APK (sideload): poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}-release.apk" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Debug APK (no signing secrets): poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}-debug.apk" >> "$GITHUB_STEP_SUMMARY"
            echo "- Add ANDROID_SIGNING_KEY, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD secrets for signed release builds" >> "$GITHUB_STEP_SUMMARY"
          fi

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs:
      - version
      - build-web
    if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both' || startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build-${{ needs.version.outputs.version_code }}
          path: frontend/build/
      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps
      - name: Install CocoaPods
        run: sudo gem install cocoapods --no-document
      - name: Sync Capacitor to iOS
        working-directory: ./frontend
        run: npx cap sync ios
      - name: Install iOS Pods
        working-directory: ./frontend/ios/App
        run: pod install
      - name: Import Apple certificate
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_P12_PASSWORD }}
      - name: Download provisioning profile
        uses: apple-actions/download-provisioning-profiles@v1
        with:
          bundle-id: ${{ env.BUNDLE_ID }}
          issuer-id: ${{ secrets.APPLE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPLE_KEY_ID }}
          api-private-key: ${{ secrets.APPLE_PRIVATE_KEY }}
      - name: Build iOS archive
        working-directory: ./frontend/ios
        run: |
          xcodebuild archive \
            -workspace App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ../poketbook-${{ needs.version.outputs.version_name }}.xcarchive \
            PRODUCT_BUNDLE_IDENTIFIER=${{ env.BUNDLE_ID }} \
            MARKETING_VERSION=${{ needs.version.outputs.version_name }} \
            CURRENT_PROJECT_VERSION=${{ needs.version.outputs.version_code }}
      - name: Export IPA
        working-directory: ./frontend
        run: |
          xcodebuild -exportArchive \
            -archivePath "poketbook-${{ needs.version.outputs.version_name }}.xcarchive" \
            -exportPath "poketbook-ipa" \
            -exportOptionsPlist "ios/App/ExportOptions.plist"
          IPA=$(find poketbook-ipa/ -name "*.ipa" | head -1)
          [ -n "$IPA" ] && mv "$IPA" "poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}.ipa"
      - uses: actions/upload-artifact@v4
        with:
          name: poketbook-ios-ipa-v${{ needs.version.outputs.version_name }}
          path: frontend/poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}.ipa
          retention-days: 90
