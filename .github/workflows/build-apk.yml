#  poketbook — Mobile App CI/CD
#  Builds: Android APK (debug, ready to install)
##############################################################

name: Build & Release poketbook Apps

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options: [ 'android', 'ios', 'both' ]
      version_override:
        description: 'Version name override (e.g. 1.2.0) — leave blank to auto-compute'
        required: false
        default: ''

env:
  REACT_APP_BACKEND_URL: https://party-tally-1.preview.emergentagent.com
  NODE_VERSION: '22'
  JAVA_VERSION: '17'
  BUNDLE_ID: 'in.poketbook.app'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

#################################################################
#  JOB 1 — Compute Version Numbers
#################################################################
jobs:
  version:
    name: Compute Version Numbers
    runs-on: ubuntu-latest
    outputs:
      version_code: ${{ steps.version.outputs.version_code }}
      version_name: ${{ steps.version.outputs.version_name }}
      release_tag:  ${{ steps.version.outputs.release_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          VERSION_CODE="${{ github.run_number }}"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION_NAME="${{ github.ref_name }}"
            VERSION_NAME="${VERSION_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version_override }}" ]]; then
            VERSION_NAME="${{ github.event.inputs.version_override }}"
          else
            VERSION_NAME="1.0.${VERSION_CODE}"
          fi

          RELEASE_TAG="v${VERSION_NAME}"

          echo "version_code=${VERSION_CODE}"  >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}"  >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}"    >> "$GITHUB_OUTPUT"

          echo "### Version Info" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |"          >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|"          >> "$GITHUB_STEP_SUMMARY"
          echo "| Version Name | \`${VERSION_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version Code | \`${VERSION_CODE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release Tag  | \`${RELEASE_TAG}\`  |" >> "$GITHUB_STEP_SUMMARY"

#################################################################
#  JOB 2 — Build React Web App
#################################################################
  build-web:
    name: Build React Web App
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Build React app
        working-directory: ./frontend
        env:
          CI: false
          DISABLE_ESLINT_PLUGIN: true
          SKIP_PREFLIGHT_CHECK: true
          GENERATE_SOURCEMAP: false
          REACT_APP_BACKEND_URL: ${{ env.REACT_APP_BACKEND_URL }}
          REACT_APP_VERSION: ${{ needs.version.outputs.version_name }}
        run: npm run build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ needs.version.outputs.version_code }}
          path: frontend/build/
          retention-days: 1

#################################################################
#  JOB 3 — Build Android APK
#################################################################
  build-android:
    name: Build Android AAB + APK
    runs-on: ubuntu-latest
    needs: [ version, build-web ]
    if: ${{ github.event.inputs.platform != 'ios' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build-${{ needs.version.outputs.version_code }}
          path: frontend/build/

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Install Capacitor CLI
        working-directory: ./frontend
        run: npm install -g @capacitor/cli@6.2.0

      - name: Sync Capacitor → Android
        working-directory: ./frontend
        run: npx cap sync android

      # ── IMPORTANT: Overwrite build.gradle AFTER cap sync ──────
      # cap sync regenerates build.gradle and can introduce null issues
      # We overwrite it with a clean, safe version immediately after
      - name: Fix build.gradle after cap sync
        run: |
          cat > frontend/android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace "in.poketbook.app"
              compileSdk rootProject.ext.compileSdkVersion
              defaultConfig {
                  applicationId "in.poketbook.app"
                  minSdkVersion rootProject.ext.minSdkVersion
                  targetSdkVersion rootProject.ext.targetSdkVersion
                  versionCode 1
                  versionName "1.0.0"
                  testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
                  aaptOptions {
                      ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
                  }
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      applicationIdSuffix ".debug"
                      versionNameSuffix "-debug"
                  }
              }
          }

          repositories {
              flatDir{
                  dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
              }
          }

          dependencies {
              implementation fileTree(include: ['*.jar'], dir: 'libs')
              implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
              implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
              implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
              implementation project(':capacitor-android')
              testImplementation "junit:junit:$junitVersion"
              androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
              androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
              implementation project(':capacitor-cordova-android-plugins')
          }

          apply from: 'capacitor.build.gradle'

          try {
              def servicesJSON = file('google-services.json')
              if (servicesJSON.text) {
                  apply plugin: 'com.google.gms.google-services'
              }
          } catch(Exception e) {
              logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
          }
          EOF

      - name: Make Gradle wrapper executable
        working-directory: ./frontend/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          V="${{ needs.version.outputs.version_name }}"
          C="${{ needs.version.outputs.version_code }}"
          APK=$(find frontend/android/app/build/outputs/apk/debug/ -name "*.apk" | head -1)
          [ -n "$APK" ] && cp "$APK" "poketbook-v${V}-${C}-debug.apk" || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: poketbook-android-apk-v${{ needs.version.outputs.version_name }}
          path: poketbook-v${{ needs.version.outputs.version_name }}-${{ needs.version.outputs.version_code }}-debug.apk
          retention-days: 30

      - name: Android build summary
        run: |
          echo "### ✅ Android Debug APK Ready" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the APK from the Artifacts section above" >> "$GITHUB_STEP_SUMMARY"
