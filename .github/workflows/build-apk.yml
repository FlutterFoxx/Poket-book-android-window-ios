name: Build and Release PoketBook Android

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version name (e.g. 1.2.0) — blank = auto'
        required: false
        default: ''

permissions:
  contents: write

env:
  REACT_APP_BACKEND_URL: https://poketbook.in
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  version:
    name: Compute Version
    runs-on: ubuntu-latest
    outputs:
      version_code: ${{ steps.v.outputs.version_code }}
      version_name: ${{ steps.v.outputs.version_name }}
      release_tag:  ${{ steps.v.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Compute version
        id: v
        run: |
          CODE="${{ github.run_number }}"
          if [[ -n "${{ github.event.inputs.version_override }}" ]]; then
            NAME="${{ github.event.inputs.version_override }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            NAME="${{ github.ref_name }}"; NAME="${NAME#v}"
          else
            NAME="1.0.${CODE}"
          fi
          echo "version_code=${CODE}"   >> "$GITHUB_OUTPUT"
          echo "version_name=${NAME}"   >> "$GITHUB_OUTPUT"
          echo "release_tag=v${NAME}"   >> "$GITHUB_OUTPUT"
          echo "### Version: ${NAME} (code ${CODE})" >> "$GITHUB_STEP_SUMMARY"

  build-web:
    name: Build React App
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps
      - name: Build React app
        working-directory: ./frontend
        env:
          CI: false
          DISABLE_ESLINT_PLUGIN: true
          SKIP_PREFLIGHT_CHECK: true
          GENERATE_SOURCEMAP: false
          REACT_APP_BACKEND_URL: ${{ env.REACT_APP_BACKEND_URL }}
          REACT_APP_GOOGLE_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
          REACT_APP_VERSION: ${{ needs.version.outputs.version_name }}
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ needs.version.outputs.version_code }}
          path: frontend/build/

  build-android:
    name: Build Android APK + AAB
    runs-on: ubuntu-latest
    needs: [version, build-web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - uses: android-actions/setup-android@v3

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build-${{ needs.version.outputs.version_code }}
          path: frontend/build/

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@6.2.0

      - name: Sync Capacitor to Android
        working-directory: ./frontend
        run: npx cap sync android

      - name: Restore build.gradle after cap sync
        run: git checkout frontend/android/app/build.gradle

      - name: Make Gradle executable
        working-directory: ./frontend/android
        run: chmod +x gradlew

      - name: Setup keystore
        run: |
          if [ -n "${{ secrets.ANDROID_SIGNING_KEY }}" ]; then
            echo "${{ secrets.ANDROID_SIGNING_KEY }}" | base64 --decode \
              > ${{ github.workspace }}/frontend/android/app/poketbook-release.keystore
            echo "Keystore loaded from secret"
          elif [ -f "${{ github.workspace }}/frontend/android/app/poketbook-release.keystore" ]; then
            echo "Using repo keystore"
          else
            echo "No keystore — will build debug"
          fi

      - name: Build Android artifacts
        working-directory: ./frontend/android
        env:
          VERSION_CODE: ${{ needs.version.outputs.version_code }}
          VERSION_NAME: ${{ needs.version.outputs.version_name }}
          KEYSTORE_PATH: ${{ github.workspace }}/frontend/android/app/poketbook-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'PoketBook@Secure2024' }}
          KEY_ALIAS:        ${{ secrets.ANDROID_KEY_ALIAS        || 'poketbook' }}
          KEY_PASSWORD:     ${{ secrets.ANDROID_KEY_PASSWORD     || 'PoketBook@Secure2024' }}
        run: |
          if [ -f "$KEYSTORE_PATH" ]; then
            echo "Building signed Release AAB + APK"
            ./gradlew bundleRelease assembleRelease --no-daemon
            echo "BUILD_TYPE=release" >> "$GITHUB_ENV"
          else
            echo "Building unsigned Debug APK"
            ./gradlew assembleDebug --no-daemon
            echo "BUILD_TYPE=debug" >> "$GITHUB_ENV"
          fi

      - name: Wipe keystore
        if: always()
        run: rm -f ${{ github.workspace }}/frontend/android/app/poketbook-release.keystore

      - name: Collect artifacts
        id: collect
        run: |
          V="${{ needs.version.outputs.version_name }}"
          C="${{ needs.version.outputs.version_code }}"
          mkdir -p release-files
          if [ "$BUILD_TYPE" = "release" ]; then
            cp "frontend/android/app/build/outputs/bundle/release/app-release.aab" \
               "release-files/PoketBook-v${V}-${C}.aab" 2>/dev/null || true
            APK=$(find frontend/android/app/build/outputs/apk/release/ -name "*.apk" | head -1)
            [ -n "$APK" ] && cp "$APK" "release-files/PoketBook-v${V}-${C}.apk" || true
          else
            APK=$(find frontend/android/app/build/outputs/apk/debug/ -name "*.apk" | head -1)
            [ -n "$APK" ] && cp "$APK" "release-files/PoketBook-v${V}-${C}-debug.apk" || true
          fi
          ls -lh release-files/

      - name: Upload artifacts (CI storage)
        uses: actions/upload-artifact@v4
        with:
          name: android-build-v${{ needs.version.outputs.version_name }}
          path: release-files/
          retention-days: 90

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.release_tag }}
          name: PoketBook ${{ needs.version.outputs.release_tag }}
          body: |
            ## PoketBook Android ${{ needs.version.outputs.release_tag }}

            ### Downloads
            - **APK** — install directly on Android (sideload)
            - **AAB** — upload to Google Play Store

            > Built from commit `${{ github.sha }}` on branch `${{ github.ref_name }}`
          files: release-files/*
          draft: false
          prerelease: false
